apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
  labels:
    app: notification
    role: downstream
    demo: blast-radius
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification
  template:
    metadata:
      labels:
        app: notification
        role: downstream
    spec:
      containers:
        - name: notification
          image: {{.Values.image}}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8003
          env:
            - name: SERVICE_VERSION
              value: "{{.Values.serviceVersion}}"
            - name: PORT
              value: "{{.Values.port}}"
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 192Mi
